<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameContainer {
            position: relative;
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        canvas {
            display: block;
            background: #0f0f23;
        }
        #scoreBoard {
            display: flex;
            justify-content: space-between;
            width: 600px;
            margin-top: 15px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
        .score {
            background: rgba(255,255,255,0.1);
            padding: 10px 30px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }
        #instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎾 Tennis Game</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>
    <div id="scoreBoard">
        <div class="score">Player: <span id="playerScore">0</span></div>
        <div class="score">Computer: <span id="computerScore">0</span></div>
    </div>
    <p id="instructions">Use mouse to move the paddle | First to 10 wins!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 80;
        const BALL_RADIUS = 8;
        const WINNING_SCORE = 10;
        
        // Game state
        let playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        let computerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 3;
        let playerScore = 0;
        let computerScore = 0;
        let gameOver = false;
        let winner = '';
        
        // Mouse control
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const root = document.documentElement;
            const mouseY = e.clientY - rect.top - root.scrollTop;
            playerY = mouseY - PADDLE_HEIGHT / 2;
            
            // Keep paddle in bounds
            if (playerY < 0) playerY = 0;
            if (playerY > canvas.height - PADDLE_HEIGHT) playerY = canvas.height - PADDLE_HEIGHT;
        });
        
        // Reset ball
        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = -ballSpeedX;
            ballSpeedY = (Math.random() * 6 - 3);
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw net
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw player paddle
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(10, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
            
            // Draw computer paddle
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(canvas.width - PADDLE_WIDTH - 10, computerY, PADDLE_WIDTH, PADDLE_HEIGHT);
            
            // Draw ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.closePath();
            
            // Draw game over message
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(winner + ' Wins!', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '20px Arial';
                ctx.fillText('Click to restart', canvas.width / 2, canvas.height / 2 + 30);
            }
        }
        
        // Move everything
        function move() {
            if (gameOver) return;
            
            ballX += ballSpeedX;
            ballY += ballSpeedY;
            
            // Ball collision with top/bottom
            if (ballY < BALL_RADIUS || ballY > canvas.height - BALL_RADIUS) {
                ballSpeedY = -ballSpeedY;
            }
            
            // Ball collision with player paddle
            if (ballX < 20 + PADDLE_WIDTH && ballY > playerY && ballY < playerY + PADDLE_HEIGHT) {
                ballSpeedX = -ballSpeedX;
                let deltaY = ballY - (playerY + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.3;
            }
            
            // Ball collision with computer paddle
            if (ballX > canvas.width - 20 - PADDLE_WIDTH && ballY > computerY && ballY < computerY + PADDLE_HEIGHT) {
                ballSpeedX = -ballSpeedX;
                let deltaY = ballY - (computerY + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.3;
            }
            
            // Computer AI
            let computerCenter = computerY + PADDLE_HEIGHT / 2;
            if (computerCenter < ballY - 35) {
                computerY += 6;
            } else if (computerCenter > ballY + 35) {
                computerY -= 6;
            }
            
            // Keep computer paddle in bounds
            if (computerY < 0) computerY = 0;
            if (computerY > canvas.height - PADDLE_HEIGHT) computerY = canvas.height - PADDLE_HEIGHT;
            
            // Ball goes off screen - score
            if (ballX < 0) {
                computerScore++;
                document.getElementById('computerScore').textContent = computerScore;
                if (computerScore >= WINNING_SCORE) {
                    gameOver = true;
                    winner = 'Computer';
                } else {
                    resetBall();
                }
            }
            
            if (ballX > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                if (playerScore >= WINNING_SCORE) {
                    gameOver = true;
                    winner = 'Player';
                } else {
                    resetBall();
                }
            }
        }
        
        // Game loop
        function gameLoop() {
            move();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Restart game
        canvas.addEventListener('click', () => {
            if (gameOver) {
                playerScore = 0;
                computerScore = 0;
                document.getElementById('playerScore').textContent = '0';
                document.getElementById('computerScore').textContent = '0';
                gameOver = false;
                resetBall();
            }
        });
        
        // Start the game
        gameLoop();
    </script>
</body>
</html>
